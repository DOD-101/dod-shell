[workspace]
members = ["crates/*"]
resolver = "3"

[workspace.package]
edition = "2024"
license = "MIT or Apache-2.0"
version = "0.1.0"

[workspace.dependencies]
common = { version = "0.1.0", path = "crates/common" }
deamon = { version = "0.1.0", path = "crates/deamon" }
dirs = "6.0.0"
futures-util = "0.3.31"
grass = "0.13.4"
gtk4-layer-shell = "0.5.0"
hyprland = "0.4.0-beta.2"
log = "0.4.27"
relm4 = "0.9.1"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
simple_logger = "5.0.0"
sysinfo = "0.35.2"
time = { version = "0.3.41", features = ["formatting", "local-offset"] }
tokio = { version = "1.47.1", features = ["full"] }
zbus = { version = "5.9.0", features = ["tokio"], default-features = false }

[workspace.lints.clippy]
pedantic = "warn"
restriction = "allow" # maybe change to warn in the future
style = "warn"

[workspace.metadata]
crane.name = "dod-shell"
